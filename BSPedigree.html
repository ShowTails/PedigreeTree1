<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>4-Generation Rabbit Pedigree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --menu-font: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: var(--menu-font);
    }

    #pedigree-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pedigree-svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none !important;
      -ms-touch-action: none !important;
    }

    #menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10020;
      border: none;
      border-radius: 10px;
      background: #234a57;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    #pedigree-menu {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 10019;
      width: 340px;
      max-height: calc(100vh - 76px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d8e1e8;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.16);
      padding: 14px;
      display: none;
      box-sizing: border-box;
      color: #234a57;
      font-family: Arial, sans-serif;
    }

    #pedigree-menu.open {
      display: block;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .menu-note {
      font-size: 12px;
      color: #5f7280;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .menu-section {
      border-top: 1px solid #e9eef2;
      padding-top: 12px;
      margin-top: 12px;
    }

    .menu-section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .menu-section label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #234a57;
    }

    .menu-section select,
    .menu-section input[type="color"],
    .menu-section input[type="range"],
    .menu-section button {
      width: 100%;
      box-sizing: border-box;
    }

    .menu-section select,
    .menu-section input[type="color"] {
      height: 38px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
      color: #234a57;
    }

    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.15);
    }

    .range-readout {
      font-size: 12px;
      color: #617483;
      margin: 4px 0 8px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-actions button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    #menu-save-btn { background: #2f6f86; color: #fff; }
    #menu-print-btn { background: #234a57; color: #fff; }
    #menu-pdf-btn { background: #3f6170; color: #fff; }
    #menu-image-btn { background: #4d7c8a; color: #fff; }
    #menu-svg-btn { background: #5d8d99; color: #fff; }
    #menu-email-pdf-btn { background: #dfe9ee; color: #234a57; }
    #reset-styles-btn { background: #eaf2f6; color: #234a57; }

    .font-picker {
      position: relative;
      width: 100%;
    }

    .font-picker-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid #cfd9e1;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 14px;
      color: #234a57;
    }

    .font-picker-arrow {
      font-size: 12px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .font-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #cfd9e1;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 10030;
    }

    .font-picker.open .font-picker-dropdown {
      display: block;
    }

    .font-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 1px solid #eef2f6;
    }

    .font-option:last-child {
      border-bottom: none;
    }

    .font-option:hover {
      background: #f8fbfd;
    }

    .font-option.active {
      background: #eaf2f6;
      font-weight: 700;
    }

    @media print {
      @page {
        margin: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        background: white !important;
      }

      #pedigree-container {
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        overflow: hidden !important;
      }

      #pedigree-svg {
        width: 100% !important;
        height: 100% !important;
        transform: none !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }

      #pedigree-container svg {
        transform: scale(1) translate(0, 0) !important;
        position: absolute !important;
        top: 0;
        left: 0;
      }

      #pedigree-container > * {
        transform: none !important;
      }

      #menu-toggle,
      #pedigree-menu {
        display: none !important;
        visibility: hidden !important;
      }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" type="button">Customize / Print</button>

  <div id="pedigree-menu">

    <div class="menu-section">

        <button id="menu-pdf-btn" type="button">Save PDF</button>
        <button id="menu-image-btn" type="button">Save PNG</button>
        <button id="menu-svg-btn" type="button">Save SVG</button>
        <button id="menu-email-pdf-btn" type="button">Email PDF</button>
        <button id="reset-styles-btn" type="button">Reset Defaults</button>
      </div>
      <div class="menu-note" id="save-status" style="margin-top:8px; margin-bottom:0;"></div>
    </div>

    <div class="menu-section">
      <label for="border-style">Border Style</label>
      <select id="border-style">
        <option value="classicDouble">Classic Double</option>
        <option value="elegantCorners">Elegant Corners</option>
        <option value="ribbonFrame">Ribbon Frame</option>
        <option value="royalArch">Royal Arch</option>
        <option value="modernGeo">Modern Geometric</option>

        <option value="ticketEdge">Ticket Edge</option>
        <option value="floralLite">Floral Lite</option>
        <option value="showFrame">Show Frame</option>
      </select>

      <label for="border-color-preset" style="margin-top:10px;">Border Color Preset</label>
      <select id="border-color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>

        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>
      </select>

      <label for="border-primary-color" style="margin-top:10px;">Border Primary Color</label>
      <input type="color" id="border-primary-color" value="#234a57">

      <label for="border-secondary-color" style="margin-top:10px;">Border Secondary Color</label>
      <input type="color" id="border-secondary-color" value="#d8c79a">
    </div>

    <div class="menu-section">
      <label for="color-preset">Preset Male / Female Pairings</label>
      <select id="color-preset">
        <option value="custom">Custom</option>
        <option value="classicBluePink">Classic Blue / Pink</option>
        <option value="navyBlush">Navy / Blush</option>
        <option value="sagePeach">Sage / Peach</option>
        <option value="tealLavender">Teal / Lavender</option>
        <option value="steelRose">Steel / Rose</option>
        <option value="iceCoral">Ice Blue / Coral</option>
        <option value="forestCream">Forest / Cream</option>
        <option value="showtails">ShowTails Blue / Cream</option>
        <option value="blackWhite">Black / White</option>

      <label for="female-box-color">Female Box Color</label>
      <input type="color" id="female-box-color" value="#f8d7da">

    <div class="menu-section">

          <span class="font-picker-arrow">▾</span>

          <div class="font-option" data-font="'Inter', sans-serif" style="font-family: 'Inter', sans-serif;">Inter</div>
          <div class="font-option" data-font="'Georgia', serif" style="font-family: 'Georgia', serif;">Georgia</div>
          <div class="font-option" data-font="'Times New Roman', serif" style="font-family: 'Times New Roman', serif;">Times New Roman</div>
          <div class="font-option" data-font="'Verdana', sans-serif" style="font-family: 'Verdana', sans-serif;">Verdana</div>
          <div class="font-option" data-font="'Courier New', monospace" style="font-family: 'Courier New', monospace;">Courier New</div>
        </div>
      </div>

      <label for="font-color" style="margin-top:10px;">Font Color</label>
      <input type="color" id="font-color" value="#000000">

      <input type="range" id="box-body-font-size" min="9" max="16" step="1" value="11">
      <div class="range-readout"><span id="box-body-font-size-value">11</span> px</div>
    </div>

      <label for="box-height">Box Height</label>
      <input type="range" id="box-height" min="110" max="190" step="5" value="125">

    </div>

      function getSearchParams() {
        let search = window.location.search || "";
        while (search.startsWith("?")) search = search.slice(1);

      function decodeParam(raw) {
        const urlDecoded = decodeURIComponent(String(raw).replace(/\+/g, " "));
        const ta = document.createElement("textarea");
        ta.innerHTML = urlDecoded;
        return ta.value;
      }

      function getParam(name) {
        return decodeParam(getRawParam(name));

      function makeEl(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([k, v]) => {
          if (k === "href") {
            el.setAttributeNS(xlinkNS, "xlink:href", v);
            el.setAttribute("href", v);
          } else {
            el.setAttribute(k, v);
          }
        });
        return el;

        t.style.fontFamily = getCurrentFont();
        t.style.fill = fontColor.value;
        t.style.fontSize = (opts.size || 14) + "px";
        if (opts.weight) t.style.fontWeight = opts.weight;
        t.textContent = text || "";
        group.appendChild(t);
        return t;

      function clearViewport() {
        while (viewport.firstChild) viewport.removeChild(viewport.firstChild);

      function destroyPanZoom() {
        if (panZoom) {
          try { panZoom.destroy(); } catch (err) {}
          panZoom = null;
        }
        viewport.removeAttribute("transform");
        window.panZoomInstance = null;
        initialized = false;
      }

      function validBox(vb) {
        return vb && isFinite(vb.width) && vb.width > 0 && isFinite(vb.height) && vb.height > 0;
      }

      function computeFit() {
        const vb = svg.viewBox.baseVal;
        if (!validBox(vb)) return null;

        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!cw || !ch) return null;

        const scale = Math.min(cw / vb.width, ch / vb.height);
        if (!isFinite(scale) || scale <= 0) return null;

        return {
          scale,
          pan: {
            x: (cw - vb.width * scale) / 2,
            y: (ch - vb.height * scale) / 2
          }
        };
      }

      function fitToContainer() {
        if (!panZoom) return;
        const fit = computeFit();
        if (!fit) return;
        panZoom.zoom(fit.scale);
        panZoom.pan(fit.pan);
      }

      function tryInitPanZoom(state = null) {
        if (initialized) return;
        if (typeof window.svgPanZoom !== "function") return;

        const vb = svg.viewBox.baseVal;
        const cw = container.clientWidth;
        const ch = container.clientHeight;
        if (!validBox(vb) || !cw || !ch) return;

        panZoom = svgPanZoom(svg, {
          viewportSelector: "#viewport",
          panEnabled: true,
          zoomEnabled: true,
          mouseWheelZoomEnabled: false,
          controlIconsEnabled: false,
          fit: false,
          center: false,
          minZoom: 0.25,
          maxZoom: 10,
          dblClickZoomEnabled: true
        });

        window.panZoomInstance = panZoom;

        if (state && isFinite(state.zoom)) {
          panZoom.zoom(state.zoom);
          panZoom.pan(state.pan || { x: 0, y: 0 });
        } else {
          fitToContainer();
        }

        wireWheelZoom();
        enablePointerPan();
        enablePinchZoom();
        initialized = true;
      }

      function getCurrentFont() {
        const active = Array.from(fontOptions).find(opt => opt.classList.contains("active"));
        return active ? active.dataset.font : defaults.fontFamily;
      }

      function getFontLabel(fontValue) {
        const option = Array.from(fontOptions).find(opt => opt.dataset.font === fontValue);
        return option ? option.textContent.trim() : "Arial";
      }

      function setActiveFontOption(fontValue) {
        fontOptions.forEach(opt => opt.classList.toggle("active", opt.dataset.font === fontValue));
      }

      function applyFont(fontValue, shouldRender = true) {
        selectedFontPreview.textContent = getFontLabel(fontValue);
        selectedFontPreview.style.fontFamily = fontValue;

        return "main";

            if (mainSex === "female") return femaleBoxColor.value;

          return mainBoxColor.value;

      function getPositions(boxW, boxH) {
        const meta = getLayoutMeta();
        const tree = meta.tree;
        const isPortrait = layoutOrientation.value === "portrait";

        const usableWidth = tree.right - tree.left;
        const gapX = Math.max(isPortrait ? 12 : 24, (usableWidth - (boxW * 4)) / 3);

        const x1 = tree.left;
        const x2 = x1 + boxW + gapX;
        const x3 = x2 + boxW + gapX;
        const x4 = x3 + boxW + gapX;

        const usableHeight = tree.bottom - tree.top;
        const gap4 = Math.max(isPortrait ? 4 : 6, (usableHeight - (boxH * 8)) / 7);

        const gen4 = [];
        for (let i = 0; i < 8; i++) {
          gen4.push(tree.top + i * (boxH + gap4));
        }

        const centerY = (boxTop) => boxTop + (boxH / 2);
        const topFromCenter = (center) => center - (boxH / 2);

        const ssireY = topFromCenter((centerY(gen4[0]) + centerY(gen4[1])) / 2);
        const sdamY  = topFromCenter((centerY(gen4[2]) + centerY(gen4[3])) / 2);
        const dsireY = topFromCenter((centerY(gen4[4]) + centerY(gen4[5])) / 2);
        const ddamY  = topFromCenter((centerY(gen4[6]) + centerY(gen4[7])) / 2);

        const sireY = topFromCenter((centerY(ssireY) + centerY(sdamY)) / 2);
        const damY  = topFromCenter((centerY(dsireY) + centerY(ddamY)) / 2);
        const mainY = topFromCenter((centerY(sireY) + centerY(damY)) / 2);

        return {

      function buildBoxText(def) {
        const lines = [];
        lines.push({ text: getChain(def.titleChain), type: "title" });

        def.fields.forEach(([label, key]) => {
          lines.push({ text: `${label}: ${getParam(key)}`, type: "field" });
        });

        def.extra.forEach(key => {
          const raw = getParam(key);
          if (!raw) return;
          raw.replace(/\\n/g, "\n").split("\n").forEach(line => {
            if (line.trim()) lines.push({ text: line.trim(), type: "extra" });
          });
        });

        return lines;
      }

      function getLineRenderMetrics(line) {
        const bodySize = Number(boxBodyFontSizeInput.value);
        const nameSize = Number(boxNameFontSizeInput.value);

        if (line.type === "title") {
          return {
            fontSize: nameSize,
            lineHeight: Math.max(nameSize, bodySize + 1),
            weight: "700"
          };
        }

        return {
          fontSize: bodySize,
          lineHeight: Math.max(bodySize, 10),
          weight: "400"
        };
      }

      function fitTextLinesToBox(lines, boxH) {
        const topPad = 11;
        const bottomPad = 4;
        const usableH = boxH - topPad - bottomPad;
        let used = 0;
        const visible = [];

        for (const line of lines) {
          const metrics = getLineRenderMetrics(line);
          if (used + metrics.lineHeight > usableH) break;
          visible.push({ ...line, metrics });
          used += metrics.lineHeight;
        }

        return { visible, topPad };
      }

        if (def.gen >= 4 || !def.wins) return;
        const raw = getParam(def.wins);

        const lines = raw.replace(/\\n/g, "\n").split("\n").filter(Boolean);
        if (!lines.length) return;

        const size = Math.max(10, Number(boxBodyFontSizeInput.value));
        const textEl = makeEl("text", { x: x + 6, y: y + boxH + 16 });
        textEl.style.fontFamily = getCurrentFont();
        textEl.style.fill = fontColor.value;
        textEl.style.fontSize = size + "px";

        lines.slice(0, 3).forEach((line, i) => {
          const ts = makeEl("tspan", {
            x: x + 6,
            dy: i === 0 ? 0 : size + 2

          textEl.appendChild(ts);

        for (let py = y + 34; py < y + h - 34; py += step) {

          transform: `scale(${scale})`
        }));
        group.appendChild(g);

      function drawBorder(group, meta) {
        const style = borderStyleInput.value;
        const primary = borderPrimaryColor.value;
        const secondary = borderSecondaryColor.value;
        const b = meta.border;
        const x = b.x;
        const y = b.y;
        const w = b.w;
        const h = b.h;
        const cx = x + w / 2;

        group.appendChild(makeEl("rect", {
          x: 0, y: 0, width: meta.canvas.width, height: meta.canvas.height, fill: "#ffffff"
        }));

        switch (style) {
          case "classicDouble":
            addRect(group, x, y, w, h, primary, 7);
            addRect(group, x + 16, y + 16, w - 32, h - 32, secondary, 2.5);
            addRect(group, x + 32, y + 32, w - 64, h - 64, primary, 1.5);
            addRect(group, x + 46, y + 46, w - 92, h - 92, secondary, 1.1);
            drawMedallion(group, x + 58, y + 58, 14, primary, secondary);
            drawMedallion(group, x + w - 58, y + 58, 14, primary, secondary);
            drawMedallion(group, x + 58, y + h - 58, 14, primary, secondary);
            drawMedallion(group, x + w - 58, y + h - 58, 14, primary, secondary);
            break;

          case "elegantCorners":
            addRect(group, x + 8, y + 8, w - 16, h - 16, primary, 4);
            addRect(group, x + 28, y + 28, w - 56, h - 56, secondary, 2);
            addRect(group, x + 40, y + 40, w - 80, h - 80, primary, 1.1);
            drawCornerFlourish(group, x + 30, y + 30, primary, secondary, "tl");
            drawCornerFlourish(group, x + w - 30, y + 30, primary, secondary, "tr");
            drawCornerFlourish(group, x + 30, y + h - 30, primary, secondary, "bl");
            drawCornerFlourish(group, x + w - 30, y + h - 30, primary, secondary, "br");
            break;

          case "ribbonFrame":
            addRect(group, x + 14, y + 18, w - 28, h - 36, primary, 5);
            addRect(group, x + 32, y + 36, w - 64, h - 72, secondary, 2.4);
            addRect(group, x + 46, y + 50, w - 92, h - 100, primary, 1.2);
            drawRibbonCrest(group, cx, y + 18, 240, 44, primary, secondary);
            drawRibbonCrest(group, cx, y + h - 62, 220, 40, primary, secondary);
            break;

          case "royalArch":
            addRect(group, x + 16, y + 44, w - 32, h - 60, primary, 5);
            addRect(group, x + 34, y + 62, w - 68, h - 96, secondary, 2.2);
            addPath(group, `M ${x+120} ${y+44} Q ${cx} ${y-42} ${x+w-120} ${y+44}`, secondary, 6);
            addPath(group, `M ${x+162} ${y+58} Q ${cx} ${y-6} ${x+w-162} ${y+58}`, primary, 2);
            drawMedallion(group, cx, y + 26, 16, primary, secondary);
            drawLaurelSprig(group, cx - 46, y + 40, primary, secondary, -1);
            drawLaurelSprig(group, cx + 46, y + 40, primary, secondary, 1);
            break;

          case "modernGeo":
            addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 4);
            addRect(group, x + 28, y + 28, w - 56, h - 56, secondary, 2);
            addRect(group, x + 42, y + 42, w - 84, h - 84, primary, 1.2);
            drawInnerGuideCorners(group, x + 22, y + 22, w - 44, h - 44, secondary);
            break;

          case "scallop":
            drawScallopBand(group, x + 16, y + 16, w - 32, h - 32, primary, secondary);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2);
            addRect(group, x + 48, y + 48, w - 96, h - 96, primary, 1.1);
            break;

          case "ornateLines":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 1.8);
            drawCornerFlourish(group, x + 26, y + 26, primary, secondary, "tl");
            drawCornerFlourish(group, x + w - 26, y + 26, primary, secondary, "tr");
            drawCornerFlourish(group, x + 26, y + h - 26, primary, secondary, "bl");
            drawCornerFlourish(group, x + w - 26, y + h - 26, primary, secondary, "br");
            break;

          case "ticketEdge":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4, "none", 20, 20);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2, "none", 14, 14);
            drawRibbonCrest(group, cx, y + 22, 210, 40, primary, secondary);
            break;

          case "floralLite":
            addRect(group, x + 16, y + 16, w - 32, h - 32, primary, 4);
            addRect(group, x + 34, y + 34, w - 68, h - 68, secondary, 2);
            addRect(group, x + 48, y + 48, w - 96, h - 96, primary, 1.2);

              [x + 58, y + h - 58],
              [x + w - 58, y + h - 58]

              drawLeaf(group, px, py, 1.0, primary, secondary, 1);

            addRect(group, x + 10, y + 10, w - 20, h - 20, primary, 6);

            drawRosette(group, x + w - 54, y + h - 54, 18, primary, secondary);
            drawRibbonCrest(group, cx, y + 20, 230, 42, primary, secondary);
            break;

      function applySettings(settings, shouldRender = true) {
        if (!settings || typeof settings !== "object") return;

        if (settings.borderStyle) borderStyleInput.value = settings.borderStyle;
        if (settings.borderColorPreset != null) borderColorPreset.value = settings.borderColorPreset;
        if (settings.borderPrimary) borderPrimaryColor.value = settings.borderPrimary;
        if (settings.borderSecondary) borderSecondaryColor.value = settings.borderSecondary;
        if (settings.preset != null) colorPreset.value = settings.preset;
        if (settings.mainSexColor != null) mainSexColorToggle.checked = !!settings.mainSexColor;
        if (settings.main) mainBoxColor.value = settings.main;
        if (settings.male) maleBoxColor.value = settings.male;
        if (settings.female) femaleBoxColor.value = settings.female;
        if (settings.fontColor) fontColor.value = settings.fontColor;
        if (settings.layout) layoutOrientation.value = settings.layout;
        if (settings.boxWidth != null) boxWidthInput.value = settings.boxWidth;
        if (settings.boxHeight != null) boxHeightInput.value = settings.boxHeight;
        if (settings.nameFont != null) boxNameFontSizeInput.value = settings.nameFont;
        if (settings.bodyFont != null) boxBodyFontSizeInput.value = settings.bodyFont;
        if (settings.lineStyle) lineStyleInput.value = settings.lineStyle;
        if (settings.lineColor) lineColorInput.value = settings.lineColor;
        if (settings.lineThickness != null) lineThicknessInput.value = settings.lineThickness;
        if (settings.watermarkEnabled != null) toggleWatermark.checked = !!settings.watermarkEnabled;
        if (settings.watermarkOpacity != null) watermarkOpacity.value = settings.watermarkOpacity;
        if (settings.watermarkSize != null) watermarkSize.value = settings.watermarkSize;
        if (settings.rabbitPhotoEnabled != null) toggleRabbitPhoto.checked = !!settings.rabbitPhotoEnabled;

        if (settings.fontFamily) {
          applyFont(settings.fontFamily, false);
        }

        if (shouldRender) render(false);
      }

      async function saveSettingsToShowTails() {
        const settings = getCurrentSettings();
        const email = getParam("email").trim();

        if (!email) {
          saveStatus.textContent = "Unable to save: missing email address.";
          return;
        }

        saveStatus.textContent = "Saving settings...";
        saveBtn.disabled = true;

        try {
          const response = await fetch(SAVE_SETTINGS_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email,
              savedPedigreeSettings: JSON.stringify(settings)
            })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          saveStatus.textContent = "Settings saved.";

          try {
            const url = new URL(window.location.href);
            url.searchParams.set("saved", JSON.stringify(settings));
            window.history.replaceState({}, "", url.toString());
          } catch (err) {}
        } catch (error) {
          saveStatus.textContent = "Could not save settings.";
        } finally {
          saveBtn.disabled = false;
        }
      }

        if (!window.panZoomInstance) return null;

          pan: window.panZoomInstance.getPan(),
          zoom: window.panZoomInstance.getZoom()
        };
      }

      function resetForPrint() {
        const inst = window.panZoomInstance;
        if (!inst) return;

        window._savedPrintState = capturePrintState();
        const profile = getForcedPrintProfile().desktop;

        inst.resetZoom();
        inst.center();
        inst.zoom(profile.zoom);
        inst.pan(profile.pan);
      }

      function restoreAfterPrint() {
        const inst = window.panZoomInstance;
        const s = window._savedPrintState;
        if (inst && s) {
          inst.zoom(s.zoom);
          inst.pan(s.pan);
        }
      }

      function runDesktopPrint() {
        resetForPrint();
        requestAnimationFrame(() => {

          }, 180);
        });
      }

      function inlineExternalImagesForExport(targetSvg) {
        const imageNodes = Array.from(targetSvg.querySelectorAll("image"));
        const promises = imageNodes.map((img) => {
          const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
          if (!href || href.startsWith("data:")) return Promise.resolve();

          return fetch(href, { mode: "cors" })
            .then(res => {
              if (!res.ok) throw new Error("Image fetch failed");
              return res.blob();
            })
            .then(blob => new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => {
                img.setAttribute("href", reader.result);
                img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", reader.result);
                resolve();
              };
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            }))
            .catch(() => {});
        });

        return Promise.all(promises);
      }

      async function saveSvgAsPng() {
        saveStatus.textContent = "Preparing PNG...";
        try {
          const serializer = new XMLSerializer();
          const svgClone = svg.cloneNode(true);

          svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          svgClone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

          await inlineExternalImagesForExport(svgClone);

          const viewBox = svg.getAttribute("viewBox");
          const vb = viewBox ? viewBox.split(" ").map(Number) : [0, 0, 1650, 1275];
          const exportWidth = vb[2];
          const exportHeight = vb[3];

          const svgString = serializer.serializeToString(svgClone);
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const url = URL.createObjectURL(blob);

          const img = new Image();
          img.onload = function () {
            const scale = 2;
            const canvas = document.createElement("canvas");
            canvas.width = exportWidth * scale;
            canvas.height = exportHeight * scale;

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            URL.revokeObjectURL(url);

            canvas.toBlob(function (pngBlob) {
              if (!pngBlob) {
                saveStatus.textContent = "Could not create PNG.";
                return;
              }

              const a = document.createElement("a");
              const pngUrl = URL.createObjectURL(pngBlob);
              const rabbitName = (getParam("name") || "pedigree").replace(/[^\w\-]+/g, "_").replace(/^_+|_+$/g, "");

              a.href = pngUrl;
              a.download = `${rabbitName || "pedigree"}.png`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);

              setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
              saveStatus.textContent = "PNG saved.";
            }, "image/png");
          };

          img.onerror = function () {
            URL.revokeObjectURL(url);
            saveStatus.textContent = "Unable to save PNG. One or more external images may be blocking export.";
          };

          img.src = url;
        } catch (err) {
          saveStatus.textContent = "Unable to save PNG.";
        }
      }

                    height: ${isPortrait ? "10.25in" : "7.4in"} !important;
                    background: white !important;
                    margin: 0;
                    display: block;
                    transform: none !important;
                  }
                </style>
              </head>
              <body>
                <div id="pedigree-container">${svgMarkup}</div>
              </body>
            </html>
          `);

          popup.document.close();

          setTimeout(() => {
            popup.focus();
            popup.print();
            setTimeout(() => popup.close(), 1500);
          }, 600);
        });
      }

      function runPrintFlow() {
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        if (isMobile) {
          runMobilePrint();
        } else {
          runDesktopPrint();
        }
      }

      function applyPresetIfNeeded() {
        const selected = colorPreset.value;
        if (selected === "custom") return;
        const preset = presets[selected];
        if (!preset) return;
        maleBoxColor.value = preset.male;
        femaleBoxColor.value = preset.female;
        mainBoxColor.value = preset.main;
      }

      function applyBorderPresetIfNeeded() {
        const selected = borderColorPreset.value;
        if (selected === "custom") return;
        const preset = borderPresets[selected];
        if (!preset) return;
        borderPrimaryColor.value = preset.primary;
        borderSecondaryColor.value = preset.secondary;
      }

      function wireWheelZoom() {
        if (wheelWired) return;

        container.addEventListener("wheel", (e) => {
          if (!panZoom) return;
          const rect = svg.getBoundingClientRect();
          const point = { x: e.clientX - rect.left, y: e.clientY - rect.top };
          const factor = e.deltaY > 0 ? 0.9 : 1.1;
          e.preventDefault();
          if (isFinite(point.x) && isFinite(point.y)) {
            panZoom.zoomAtPoint(factor, point);
          }
        }, { passive: false });

        wheelWired = true;
      }

      function enablePointerPan() {
        if (pointerWired) return;

        let isPanning = false;
        let start = { x: 0, y: 0 };

        svg.addEventListener("pointerdown", (e) => {
          isPanning = true;
          start = { x: e.clientX, y: e.clientY };
          if (svg.setPointerCapture) svg.setPointerCapture(e.pointerId);
        });

        svg.addEventListener("pointermove", (e) => {
          if (!isPanning || !panZoom) return;
          const dx = e.clientX - start.x;
          const dy = e.clientY - start.y;
          panZoom.panBy({ x: dx, y: dy });
          start = { x: e.clientX, y: e.clientY };
        });

        svg.addEventListener("pointerup", () => { isPanning = false; });
        svg.addEventListener("pointercancel", () => { isPanning = false; });

        pointerWired = true;
      }

      function enablePinchZoom() {
        if (pinchWired) return;

        let pinchStart = null;
        let startZoom = 1;

        svg.addEventListener("touchstart", (e) => {
          if (e.touches.length === 2 && panZoom) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStart = Math.hypot(dx, dy);
            startZoom = panZoom.getZoom();
          }
        }, { passive: false });

        svg.addEventListener("touchmove", (e) => {
          if (e.touches.length === 2 && panZoom && pinchStart) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const pinchNow = Math.hypot(dx, dy);
            const zoomRatio = pinchNow / pinchStart;

            const rect = svg.getBoundingClientRect();
            const mid = {
              x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
              y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
            };

            panZoom.zoomAtPoint(startZoom * zoomRatio, mid);
          }
        }, { passive: false });

        svg.addEventListener("touchend", () => {
          pinchStart = null;
        });

        pinchWired = true;
      }

      function resetDefaults(shouldRender = true) {
        borderStyleInput.value = defaults.borderStyle;
        borderColorPreset.value = defaults.borderColorPreset;
        borderPrimaryColor.value = defaults.borderPrimary;
        borderSecondaryColor.value = defaults.borderSecondary;
        colorPreset.value = defaults.preset;
        mainSexColorToggle.checked = defaults.mainSexColor;
        mainBoxColor.value = defaults.main;
        maleBoxColor.value = defaults.male;
        femaleBoxColor.value = defaults.female;
        fontColor.value = defaults.fontColor;
        layoutOrientation.value = defaults.layout;
        boxWidthInput.value = defaults.boxWidth;
        boxHeightInput.value = defaults.boxHeight;
        boxNameFontSizeInput.value = defaults.nameFont;
        boxBodyFontSizeInput.value = defaults.bodyFont;
        lineStyleInput.value = defaults.lineStyle;
        lineColorInput.value = defaults.lineColor;
        lineThicknessInput.value = defaults.lineThickness;
        toggleWatermark.checked = defaults.watermarkEnabled;
        watermarkOpacity.value = defaults.watermarkOpacity;
        watermarkSize.value = defaults.watermarkSize;
        toggleRabbitPhoto.checked = defaults.rabbitPhotoEnabled;
        saveStatus.textContent = "";
        applyFont(defaults.fontFamily, false);

        if (shouldRender) render(false);
      }

      menuToggle.addEventListener("click", () => {
        pedigreeMenu.classList.toggle("open");
      });

      document.addEventListener("click", (event) => {
        if (!pedigreeMenu.contains(event.target) && event.target !== menuToggle) {
          pedigreeMenu.classList.remove("open");
        }
      });

      fontPickerButton.addEventListener("click", (e) => {
        e.stopPropagation();
        fontPicker.classList.toggle("open");
      });

      fontOptions.forEach(option => {
        option.addEventListener("click", () => {
          applyFont(option.dataset.font, false);
          render(false);
          fontPicker.classList.remove("open");
        });
      });

      document.addEventListener("click", (event) => {
        if (!fontPicker.contains(event.target)) {
          fontPicker.classList.remove("open");
        }
      });

      colorPreset.addEventListener("change", () => {
        applyPresetIfNeeded();
        render(false);
      });

      borderColorPreset.addEventListener("change", () => {
        applyBorderPresetIfNeeded();
        render(false);
      });

      [
        borderStyleInput,
        borderPrimaryColor,
        borderSecondaryColor,
        mainSexColorToggle,
        mainBoxColor,
        maleBoxColor,
        femaleBoxColor,
        fontColor,
        layoutOrientation,
        boxWidthInput,
        boxHeightInput,
        boxNameFontSizeInput,
        boxBodyFontSizeInput,
        lineStyleInput,
        lineColorInput,
        lineThicknessInput,
        toggleWatermark,
        watermarkOpacity,
        watermarkSize,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("input", () => render(false)));

      [
        mainSexColorToggle,
        layoutOrientation,
        toggleWatermark,
        toggleRabbitPhoto
      ].forEach(el => el.addEventListener("change", () => render(false)));

      [borderPrimaryColor, borderSecondaryColor].forEach(el => {
        el.addEventListener("input", () => {
          borderColorPreset.value = "custom";
        });
      });

      [mainBoxColor, maleBoxColor, femaleBoxColor].forEach(el => {
        el.addEventListener("input", () => {
          colorPreset.value = "custom";
        });
      });

      saveBtn.addEventListener("click", saveSettingsToShowTails);
      resetStylesBtn.addEventListener("click", () => resetDefaults(true));
      printBtn.addEventListener("click", runPrintFlow);
      pdfBtn.addEventListener("click", runPrintFlow);
      imageBtn.addEventListener("click", saveSvgAsPng);
      svgBtn.addEventListener("click", saveSvgFile);
      emailPdfBtn.addEventListener("click", emailPdfNotice);

      const ro = new ResizeObserver(() => {
        if (panZoom) {
          fitToContainer();
        } else {
          tryInitPanZoom();
        }
      });
      ro.observe(container);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (panZoom) fitToContainer();
          else tryInitPanZoom();
        }
      });

      window.addEventListener("beforeprint", resetForPrint);
      window.addEventListener("afterprint", restoreAfterPrint);

      window.addEventListener("load", () => {
        refreshParams();
        resetDefaults(false);

        const savedSettings = getSavedSettingsFromUrl();
        if (savedSettings) {
          applySettings(savedSettings, false);
        }

        render(false);
      });
    })();
  </script>
</body>
</html>
